<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Luau WASM</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f6f7f9;
      --panel: #ffffff;
      --text: #17202a;
      --muted: #5c6670;
      --line: #d8dde3;
      --accent: #1367d8;
      --accent-dark: #0f4fa8;
      --code-bg: #151923;
      --code-text: #eef2f7;
      --error-bg: #3a171d;
      --error-text: #ffd8df;
      --ok-bg: #e9f6ef;
      --ok-text: #174d2f;
      --info-bg: #eaf2ff;
      --info-text: #173d72;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      line-height: 1.5;
    }

    main {
      width: min(1120px, calc(100vw - 32px));
      margin: 0 auto;
      padding: 28px 0 36px;
    }

    header {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 24px;
      margin-bottom: 18px;
    }

    h1 {
      margin: 0;
      font-size: clamp(28px, 4vw, 42px);
      line-height: 1.05;
      letter-spacing: 0;
    }

    .lede {
      max-width: 680px;
      margin: 8px 0 0;
      color: var(--muted);
      font-size: 16px;
    }

    .status {
      min-width: 260px;
      max-width: 420px;
      padding: 10px 12px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: var(--info-bg);
      color: var(--info-text);
      font-size: 14px;
    }

    .status.ready {
      background: var(--ok-bg);
      color: var(--ok-text);
    }

    .status.error {
      background: #ffecef;
      color: #7c1724;
    }

    .examples {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin: 18px 0;
    }

    .example {
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #fff;
      color: var(--text);
      cursor: pointer;
      font: inherit;
      font-size: 14px;
      padding: 7px 10px;
    }

    .example:hover {
      border-color: #aeb7c2;
      background: #fdfdfd;
    }

    .workspace {
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(320px, 0.82fr);
      gap: 16px;
      align-items: stretch;
    }

    .pane {
      min-width: 0;
    }

    .pane-title {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 8px;
      color: var(--muted);
      font-size: 13px;
      font-weight: 650;
      text-transform: uppercase;
    }

    textarea {
      display: block;
      width: 100%;
      min-height: 430px;
      resize: vertical;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: var(--panel);
      color: var(--text);
      padding: 14px;
      font: 15px/1.5 ui-monospace, SFMono-Regular, Menlo, Consolas, "Liberation Mono", monospace;
      tab-size: 2;
    }

    textarea:focus {
      outline: 3px solid rgba(19, 103, 216, 0.18);
      border-color: var(--accent);
    }

    .output {
      min-height: 430px;
      max-height: 70vh;
      overflow: auto;
      border-radius: 6px;
      border: 1px solid #252b36;
      background: var(--code-bg);
      color: var(--code-text);
      padding: 14px;
      white-space: pre-wrap;
      word-break: break-word;
      font: 14px/1.5 ui-monospace, SFMono-Regular, Menlo, Consolas, "Liberation Mono", monospace;
    }

    .output.error {
      background: var(--error-bg);
      color: var(--error-text);
      border-color: #69313b;
    }

    .toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 14px;
    }

    button {
      min-height: 40px;
      border: 1px solid transparent;
      border-radius: 6px;
      cursor: pointer;
      font: inherit;
      font-weight: 650;
      padding: 8px 14px;
    }

    button.primary {
      background: var(--accent);
      color: #fff;
    }

    button.primary:hover:not(:disabled) {
      background: var(--accent-dark);
    }

    button.secondary {
      background: #fff;
      border-color: var(--line);
      color: var(--text);
    }

    button.secondary:hover:not(:disabled) {
      background: #f0f2f5;
    }

    button:disabled {
      cursor: wait;
      opacity: 0.6;
    }

    .time {
      align-self: center;
      color: var(--muted);
      font-size: 13px;
    }

    @media (max-width: 820px) {
      main {
        width: min(100vw - 20px, 680px);
        padding-top: 16px;
      }

      header,
      .workspace {
        display: block;
      }

      .status {
        max-width: none;
        margin-top: 14px;
      }

      .pane + .pane {
        margin-top: 16px;
      }

      textarea,
      .output {
        min-height: 300px;
      }
    }
  </style>
</head>
<body>
  <main>
    <header>
      <div>
        <h1>Luau WASM</h1>
        <p class="lede">Run Luau in the browser through Pyodide after installing the <code>luau-wasm</code> WebAssembly wheel from PyPI.</p>
      </div>
      <div id="status" class="status">Loading Pyodide 314.0.0...</div>
    </header>

    <div class="examples" id="examples"></div>

    <section class="workspace" aria-label="Luau playground">
      <div class="pane">
        <div class="pane-title">
          <span>Luau Source</span>
        </div>
        <textarea id="source" spellcheck="false"></textarea>
        <div class="toolbar">
          <button class="primary" id="run" disabled>Run</button>
          <button class="secondary" id="clear">Clear</button>
          <span class="time" id="time"></span>
        </div>
      </div>

      <div class="pane">
        <div class="pane-title">
          <span>Output</span>
          <button class="secondary" id="copy">Copy</button>
        </div>
        <pre class="output" id="output">Waiting for Pyodide...</pre>
      </div>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/pyodide/v314.0.0/full/pyodide.js"></script>
  <script>
    const examples = [
      {
        name: "Hello World",
        code: 'print("Hello from Luau!")'
      },
      {
        name: "Variables",
        code: [
          'local name: string = "Luau"',
          'local features: {string} = {"gradual typing", "sandboxing", "fast VM"}',
          '',
          'print("Language: " .. name)',
          'for i, feature in ipairs(features) do',
          '    print(`{i}. {feature}`)',
          'end'
        ].join("\n")
      },
      {
        name: "Tables",
        code: [
          'local person = {',
          '    name = "Ada",',
          '    scores = {8, 13, 21}',
          '}',
          '',
          'print(person.name)',
          'print(table.concat(person.scores, ", "))'
        ].join("\n")
      },
      {
        name: "Fibonacci",
        code: [
          'local function fib(n: number): number',
          '    if n < 2 then return n end',
          '    return fib(n - 1) + fib(n - 2)',
          'end',
          '',
          'local out = {}',
          'for i = 0, 12 do',
          '    table.insert(out, tostring(fib(i)))',
          'end',
          'print(table.concat(out, ", "))'
        ].join("\n")
      },
      {
        name: "Runtime Error",
        code: [
          'local user = nil',
          'print(user.name)'
        ].join("\n")
      }
    ];

    const source = document.querySelector("#source");
    const output = document.querySelector("#output");
    const runButton = document.querySelector("#run");
    const clearButton = document.querySelector("#clear");
    const copyButton = document.querySelector("#copy");
    const status = document.querySelector("#status");
    const time = document.querySelector("#time");
    const examplesContainer = document.querySelector("#examples");

    let pyodide = null;
    let ready = false;

    function setStatus(message, kind = "info") {
      status.textContent = message;
      status.className = `status ${kind === "info" ? "" : kind}`;
    }

    function setOutput(text, isError = false) {
      output.textContent = text || "";
      output.classList.toggle("error", isError);
    }

    function saveHash() {
      const value = source.value.trim();
      if (value) {
        history.replaceState(null, "", `#${encodeURIComponent(source.value)}`);
      } else {
        history.replaceState(null, "", location.pathname + location.search);
      }
    }

    function loadInitialSource() {
      if (location.hash.length > 1) {
        try {
          source.value = decodeURIComponent(location.hash.slice(1));
          return;
        } catch {
          source.value = examples[0].code;
          return;
        }
      }
      source.value = examples[0].code;
    }

    async function initialize() {
      try {
        pyodide = await loadPyodide();
        setStatus("Loading micropip...");
        await pyodide.loadPackage("micropip");
        setStatus('Installing "luau-wasm" from PyPI...');
        await pyodide.runPythonAsync(`
import micropip
await micropip.install("luau-wasm")
import luau_wasm
`);
        ready = true;
        runButton.disabled = false;
        setStatus("Ready", "ready");
        setOutput("");
      } catch (error) {
        runButton.disabled = true;
        setStatus("Initialization failed", "error");
        setOutput(String(error.message || error), true);
      }
    }

    async function runSource() {
      if (!ready) {
        return;
      }

      runButton.disabled = true;
      time.textContent = "";
      const started = performance.now();

      try {
        pyodide.globals.set("luau_source", source.value);
        const result = pyodide.runPython(`
import luau_wasm
luau_wasm.execute(luau_source)
`);
        setOutput(result || "");
        time.textContent = `${(performance.now() - started).toFixed(1)} ms`;
        saveHash();
      } catch (error) {
        setOutput(String(error.message || error), true);
        time.textContent = `${(performance.now() - started).toFixed(1)} ms`;
      } finally {
        runButton.disabled = false;
        source.focus();
      }
    }

    for (const example of examples) {
      const button = document.createElement("button");
      button.className = "example";
      button.type = "button";
      button.textContent = example.name;
      button.addEventListener("click", () => {
        source.value = example.code;
        saveHash();
        source.focus();
      });
      examplesContainer.appendChild(button);
    }

    loadInitialSource();

    source.addEventListener("input", saveHash);
    source.addEventListener("keydown", (event) => {
      if ((event.metaKey || event.ctrlKey) && event.key === "Enter") {
        event.preventDefault();
        runSource();
      }
    });

    runButton.addEventListener("click", runSource);

    clearButton.addEventListener("click", () => {
      source.value = "";
      setOutput("");
      time.textContent = "";
      saveHash();
      source.focus();
    });

    copyButton.addEventListener("click", async () => {
      await navigator.clipboard.writeText(output.textContent);
    });

    initialize();
  </script>
</body>
</html>
